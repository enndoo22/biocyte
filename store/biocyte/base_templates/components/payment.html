{% load static %}
<section class="payment-modern" id="payment">
    <div class="container">
        <div class="payment-header">
<!--            <span class="payment-subtitle">Payment Methods</span>-->
            <h2 class="payment-main-title">Способы оплаты</h2>
            <p class="payment-intro">Мы сделали оплату удобной для вас. <br> Вы можете рассчитаться любым из доступных способов:</p>
        </div>

        <div class="payment-cards-row">
            <div class="payment-card-item">
                <div class="card-inner">
                    <div class="card-icon-box">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
                    </div>
                    <h3>Оплата картой</h3>
                    <p>Оплата доступа в офисе компании при самовывозе или при доставке на дом.</p>
                </div>
            </div>

            <div class="payment-card-item">
                <div class="card-inner">
                    <div class="card-icon-box">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
                    </div>
                    <h3>Оплата наличными</h3>
                    <p>Оплата доступна в офисе компании при самовывозе.</p>
                </div>
            </div>
        </div>
    </div>
</section>
